<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mission Reliability — Group Status Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #F5F7FA;
    --text: #111827;
    --text-muted: #5B6472;
    --text-faint: #8A93A1;
    --primary: #005FBE;
    --primary-dark: #00468D;
    --alert: #FF3838;
    --alert-dark: #D62828;
    --alert-tint: #FFF0F0;
    --amber: #C97A12;
    --amber-tint: #FFF6E8;
    --amber-border: #F0B854;
    --grey-dot: #9CA3AF;
    --green: #1A9E5C;
    --green-tint: #E9F8F0;
    --grey-tint: #F0F2F5;
    --grey-text: #6B7280;
    --surface: #FFFFFF;
    --border: #E2E6EC;
    --border-strong: #D2D8E0;
    --radius: 12px;
  }

  *{ box-sizing: border-box; }

  body{
    margin: 0;
    min-width: 960px;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .mono{
    font-family: 'IBM Plex Mono', monospace;
  }

  .page{
    max-width: 1240px;
    margin: 0 auto;
    padding: 40px 32px 80px;
  }

  .page-header{
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border-strong);
  }

  .page-header h1{
    font-size: 20px;
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .page-header .subtitle{
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .timestamp{
    font-size: 12px;
    color: var(--text-faint);
    text-align: right;
  }

  .timestamp .live{
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--primary);
    font-weight: 600;
    margin-bottom: 4px;
  }

  .live-dot{
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--primary);
    animation: livepulse 2s ease-in-out infinite;
  }

  @keyframes livepulse{
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
  }

  .card-grid{
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }

  .card-grid.is-box{
    grid-template-columns: repeat(3, 1fr);
    align-items: start;
  }

  /* ---------- VIEW TOGGLE ---------- */

  .view-toggle{
    display: inline-flex;
    align-items: center;
    gap: 2px;
    padding: 3px;
    background: #EAEDF1;
    border-radius: 9px;
  }

  .view-toggle button{
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 7px 14px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }

  .view-toggle button.active{
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 1px 2px rgba(17,24,39,0.08);
  }

  /* ---------- CARD ---------- */

  .group-card{
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 1px 2px rgba(17,24,39,0.04);
    transition: box-shadow 0.15s ease, border-color 0.15s ease;
  }

  .group-card.is-risk{
    box-shadow: 0 2px 10px rgba(17,24,39,0.07);
  }

  .group-card:hover{
    border-color: var(--border-strong);
  }

  .status-edge{
    position: absolute;
    top: 0;
    left: 0;
    bottom: 0;
    width: 5px;
  }

  .group-card[data-status="red"] .status-edge{ background: var(--alert); }
  .group-card[data-status="yellow"] .status-edge{ background: var(--amber); }
  .group-card[data-status="green"] .status-edge{ background: var(--green); }
  .group-card[data-status="grey"] .status-edge{ background: var(--grey-dot); }

  .card-main{
    display: grid;
    grid-template-columns: auto 1.6fr 1fr auto auto;
    align-items: center;
    gap: 24px;
    padding: 20px 24px 20px 28px;
    cursor: pointer;
  }

  /* status light + group code + location */
  .identity{
    display: flex;
    align-items: center;
    gap: 14px;
    min-width: 230px;
  }

  .status-light{
    width: 13px;
    height: 13px;
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
  }

  .status-light[data-status="red"]{ background: var(--alert); }
  .status-light[data-status="yellow"]{ background: var(--amber); }
  .status-light[data-status="green"]{ background: var(--green); }
  .status-light[data-status="grey"]{ background: var(--grey-dot); }

  .status-light[data-status="red"]::after{
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 1.5px solid var(--alert);
    animation: ringpulse 1.8s ease-out infinite;
  }

  @keyframes ringpulse{
    0% { transform: scale(0.8); opacity: 0.8; }
    100% { transform: scale(1.8); opacity: 0; }
  }

  .identity-text .group-code{
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 16px;
    letter-spacing: 0.01em;
  }

  .identity-text .location{
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* risk tag + brief note */
  .status-col{
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .risk-tag{
    display: inline-flex;
    align-items: center;
    gap: 6px;
    width: fit-content;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 100px;
    letter-spacing: 0.01em;
  }

  .risk-tag[data-status="red"]{
    background: var(--alert-tint);
    color: var(--alert-dark);
  }
  .risk-tag[data-status="yellow"]{
    background: var(--amber-tint);
    color: var(--amber);
  }
  .risk-tag[data-status="green"]{
    background: var(--grey-tint);
    color: var(--text-muted);
  }
  .risk-tag[data-status="grey"]{
    background: var(--grey-tint);
    color: var(--text-muted);
  }

  .brief-note{
    font-size: 12.5px;
    color: var(--text-faint);
    max-width: 320px;
    line-height: 1.4;
  }

  /* number brief */
  .number-col{
    text-align: left;
  }

  .number-col .count-line{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 500;
  }

  .number-col .count-line .abnormal{
    font-weight: 600;
  }

  .group-card[data-status="red"] .number-col .abnormal{ color: var(--alert-dark); }
  .group-card[data-status="yellow"] .number-col .abnormal{ color: var(--amber); }
  .group-card[data-status="green"] .number-col .abnormal{ color: var(--text-muted); }
  .group-card[data-status="grey"] .number-col .abnormal{ color: var(--text-muted); }

  .number-col .count-sub{
    font-size: 11.5px;
    color: var(--text-faint);
    margin-top: 3px;
  }

  /* mission tag */
  .mission-tag{
    font-size: 11.5px;
    font-weight: 600;
    padding: 5px 11px;
    border-radius: 100px;
    white-space: nowrap;
    letter-spacing: 0.02em;
  }

  .mission-tag.ongoing{
    background: var(--green-tint);
    color: var(--green);
  }

  .mission-tag.off{
    background: var(--grey-tint);
    color: var(--grey-text);
  }

  /* expand toggle */
  .expand-btn{
    width: 30px;
    height: 30px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.2s ease, background 0.15s ease;
    flex-shrink: 0;
  }

  .expand-btn:hover{
    background: #F7F9FB;
    border-color: var(--border-strong);
  }

  .group-card.is-expanded .expand-btn{
    transform: rotate(180deg);
    color: var(--primary);
  }

  .expand-btn svg{
    width: 14px;
    height: 14px;
  }

  /* ---------- DETAIL LAYER (Layer 2, minimal) ---------- */

  .detail-layer{
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.25s ease;
    border-top: 1px solid transparent;
  }

  .group-card.is-expanded .detail-layer{
    max-height: 600px;
    border-top: 1px solid var(--border);
  }

  .detail-inner{
    padding: 18px 24px 22px 28px;
    background: #FAFBFC;
  }

  .device-row{
    display: grid;
    grid-template-columns: 1.1fr 1fr 0.7fr 0.7fr 108px 88px 88px 64px;
    align-items: center;
    gap: 14px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    font-size: 13px;
  }

  .device-row:last-child{ margin-bottom: 0; }

  .device-row[data-risk="High risk"]{
    border-left: 3px solid var(--alert);
  }
  .device-row[data-risk="Medium risk"]{
    border-left: 3px solid var(--amber);
  }
  .device-row[data-risk="Normal"]{
    border-left: 3px solid var(--grey-dot);
  }

  .device-id{
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 13px;
  }

  .device-row[data-risk="High risk"] .device-id{ color: var(--alert-dark); }

  .device-meta{
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .device-meta .officer{
    font-weight: 500;
  }

  .device-meta .area{
    font-size: 11.5px;
    color: var(--text-faint);
  }

  .device-field-label{
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-faint);
    margin-bottom: 2px;
  }

  .device-field-value{
    font-size: 12.5px;
    font-weight: 500;
  }

  .device-field-value.flag{
    color: var(--alert-dark);
  }

  .cta-slot{
    display: flex;
    align-items: center;
    justify-content: flex-start;
  }

  .cta-slot.icon-cell{
    justify-content: center;
  }

  .cta-btn{
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 11.5px;
    font-weight: 600;
    padding: 7px 8px;
    border-radius: 7px;
    border: 1px solid transparent;
    cursor: pointer;
    white-space: nowrap;
    text-align: center;
    width: 100%;
    transition: opacity 0.15s ease, background 0.15s ease;
  }

  .cta-btn.primary-critical{
    background: var(--alert);
    color: #fff;
  }
  .cta-btn.primary-critical:hover{ background: var(--alert-dark); }

  .cta-btn.secondary-amber{
    background: var(--surface);
    color: var(--amber);
    border-color: var(--amber-border);
  }
  .cta-btn.secondary-amber:hover{ background: var(--amber-tint); }

  .cta-btn.secondary-grey{
    background: var(--surface);
    color: var(--text-muted);
    border-color: var(--border-strong);
  }
  .cta-btn.secondary-grey:hover{ background: #F0F2F5; }

  .cta-btn.ghost{
    background: transparent;
    color: var(--text-faint);
    border-color: var(--border);
    font-weight: 500;
  }
  .cta-btn.ghost:hover{ background: #F0F2F5; color: var(--text-muted); }

  .icon-btn{
    width: 28px;
    height: 28px;
    border-radius: 7px;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .icon-btn:hover{ background: #F0F2F5; }
  .icon-btn svg{ width: 13px; height: 13px; }

  .detail-footnote{
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 10px;
    padding-left: 2px;
  }

  /* column headers inside detail */
  .device-header-row{
    display: grid;
    grid-template-columns: 1.1fr 1fr 0.7fr 0.7fr 108px 88px 88px 64px;
    gap: 14px;
    padding: 0 14px 8px;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-faint);
  }

  @media (prefers-reduced-motion: reduce){
    .live-dot, .status-light[data-status="red"]::after, .expand-btn, .detail-layer{
      animation: none !important;
      transition: none !important;
    }
  }

  /* ---------- BOX CARD VARIANT ---------- */

  .box-card{
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 1px 2px rgba(17,24,39,0.04);
    transition: box-shadow 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
  }

  .box-card.is-risk{
    box-shadow: 0 2px 10px rgba(17,24,39,0.07);
  }

  .box-card:hover{
    border-color: var(--border-strong);
    transform: translateY(-1px);
  }

  .box-top{
    height: 4px;
  }

  .box-card[data-status="red"] .box-top{ background: var(--alert); }
  .box-card[data-status="yellow"] .box-top{ background: var(--amber); }
  .box-card[data-status="green"] .box-top{ background: var(--green); }
  .box-card[data-status="grey"] .box-top{ background: var(--grey-dot); }

  .box-body{
    padding: 20px 20px 18px;
  }

  .box-head{
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .box-identity{
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .box-identity .group-code{
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 600;
    font-size: 15px;
  }

  .box-mission{
    font-size: 10.5px;
    font-weight: 600;
    padding: 4px 9px;
    border-radius: 100px;
    white-space: nowrap;
  }

  .box-mission.ongoing{ background: var(--green-tint); color: var(--green); }
  .box-mission.off{ background: var(--grey-tint); color: var(--grey-text); }

  .box-location{
    font-size: 12.5px;
    color: var(--text-muted);
    margin: -8px 0 14px 22px;
  }

  .box-risk-row{
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .box-count{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
  }

  .box-count .abnormal{ font-weight: 600; }

  .box-card[data-status="red"] .box-count .abnormal{ color: var(--alert-dark); }
  .box-card[data-status="yellow"] .box-count .abnormal{ color: var(--amber); }
  .box-card[data-status="green"] .box-count .abnormal{ color: var(--text-muted); }
  .box-card[data-status="grey"] .box-count .abnormal{ color: var(--text-muted); }

  .box-divider{
    height: 1px;
    background: var(--border);
    margin: 12px 0;
  }

  .box-brief{
    font-size: 12.5px;
    color: var(--text-faint);
    line-height: 1.45;
    margin-bottom: 16px;
    min-height: 36px;
  }

  .box-footer{
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .box-link{
    font-size: 12px;
    font-weight: 600;
    color: var(--primary);
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  .box-link svg{
    width: 13px;
    height: 13px;
    transition: transform 0.15s ease;
  }

  .box-card:hover .box-link svg{
    transform: translateX(2px);
  }

  /* ---------- FILTER TABS ---------- */

  .toolbar{
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .filter-tabs{
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-label{
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-faint);
    margin-right: 2px;
  }

  .filter-tab{
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 100px;
    border: 1px solid var(--border-strong);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    transition: background 0.12s ease, color 0.12s ease, border-color 0.12s ease;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }

  .filter-tab:hover{
    background: #F0F2F5;
    border-color: #C0C6D0;
  }

  .filter-tab.active{
    font-weight: 600;
    border-color: transparent;
  }

  .filter-tab[data-filter="all"].active{
    background: #1C2231;
    color: #fff;
  }

  .filter-tab[data-filter="red"].active{
    background: var(--alert-tint);
    color: var(--alert-dark);
    border-color: #F8BABA;
  }

  .filter-tab[data-filter="yellow"].active{
    background: var(--amber-tint);
    color: var(--amber);
    border-color: var(--amber-border);
  }

  .filter-tab[data-filter="green"].active{
    background: var(--green-tint);
    color: var(--green);
    border-color: #8CD9B8;
  }

  .filter-tab[data-filter="off"].active{
    background: var(--grey-tint);
    color: var(--grey-text);
    border-color: #C9CFD8;
  }

  .filter-tab .dot{
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .filter-tab[data-filter="red"] .dot{ background: var(--alert); }
  .filter-tab[data-filter="yellow"] .dot{ background: var(--amber); }
  .filter-tab[data-filter="green"] .dot{ background: var(--green); }
  .filter-tab[data-filter="off"] .dot{ background: var(--grey-dot); }

  .filter-count{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    opacity: 0.7;
  }

  /* ---------- RECENT ACTION STRIP ---------- */

  .recent-action{
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 28px 8px 28px;
    border-top: 1px solid var(--border);
    background: #FAFBFC;
    font-size: 11.5px;
    color: var(--text-faint);
    line-height: 1.3;
    flex-wrap: wrap;
  }

  .recent-action-label{
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-faint);
    flex-shrink: 0;
  }

  .action-pill{
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 8px;
    border-radius: 5px;
    font-size: 11.5px;
    font-weight: 500;
    background: var(--grey-tint);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  .action-pill.auto{
    background: #EEF4FF;
    color: #2563EB;
    border-color: #BFDBFE;
  }

  .action-pill.manual{
    background: #F0F9FF;
    color: #0369A1;
    border-color: #BAE6FD;
  }

  .action-pill.none{
    color: var(--text-faint);
    background: transparent;
    border-color: transparent;
    font-style: italic;
  }

  .action-status{
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
  }

  .action-status.success{ color: var(--green); }
  .action-status.failed{ color: var(--alert-dark); }
  .action-status.pending{ color: var(--amber); }

  .action-ts{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    color: var(--text-faint);
    margin-left: 2px;
  }

  .action-sep{
    color: var(--border-strong);
    font-size: 11px;
  }

  /* box card recent action */
  .box-recent{
    padding: 9px 0 0;
    margin-top: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .box-recent .recent-action-label{
    font-size: 9.5px;
    margin-bottom: 2px;
  }

  .box-recent .action-pill{
    font-size: 11px;
  }

  .box-recent .action-ts{
    font-size: 10px;
  }

  /* hide cards when filtered */
  .group-card.hidden,
  .box-card.hidden{
    display: none;
  }

  .empty-state{
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-faint);
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="page">

  <div class="page-header">
    <div>
      <h1>Mission Reliability — Group Status</h1>
      <div class="subtitle">Command center overview · all deployed groups</div>
    </div>
    <div style="display:flex; align-items:center; gap:20px;">
      <div class="view-toggle">
        <button id="viewRow" class="active">Row</button>
        <button id="viewBox">Box</button>
      </div>
      <div class="timestamp">
        <div class="live"><span class="live-dot"></span>Live</div>
        <div class="mono">Updated 14:32:06 GMT+8</div>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <div class="filter-tabs" id="filterTabs">
      <span class="filter-label">Filter</span>
      <button class="filter-tab active" data-filter="all">All <span class="filter-count" id="cnt-all"></span></button>
      <button class="filter-tab" data-filter="red"><span class="dot"></span>High risk <span class="filter-count" id="cnt-red"></span></button>
      <button class="filter-tab" data-filter="yellow"><span class="dot"></span>Medium risk <span class="filter-count" id="cnt-yellow"></span></button>
      <button class="filter-tab" data-filter="green"><span class="dot"></span>Normal <span class="filter-count" id="cnt-green"></span></button>
      <button class="filter-tab" data-filter="off"><span class="dot"></span>Off <span class="filter-count" id="cnt-off"></span></button>
    </div>
  </div>

  <div class="card-grid" id="cardGrid">
    <!-- Cards injected by JS from data model below, ordered red > yellow > green -->
  </div>

</div>

<script>
(function(){

  const groups = [
    {
      status: "red",
      code: "GROUP B",
      location: "Central Hospital",
      riskTag: "High risk",
      abnormal: 3,
      total: 8,
      mission: "ongoing",
      brief: "Two body-cams unreachable since shift start, one stuck mid-recording.",
      recentAction: { type: "Auto", label: "Force Sync — Channel 2", status: "failed", ts: "2026-07-05 06:14:33 UTC" },
      devices: [
        { id: "BWC-B04", officer: "John Acuri", area: "C03", connection: "Fake online", recording: "Stuck", battery: 41, sync: "Sync delay", risk: "High risk" },
        { id: "BWC-B07", officer: "Lena Ortiz", area: "C05", connection: "Disconnected", recording: "Off", battery: 12, sync: "Sync delay", risk: "High risk" },
        { id: "BWC-B11", officer: "Marcus Webb", area: "C03", connection: "Online", recording: "Suspected recording omission", battery: 68, sync: "Normal", risk: "High risk" },
        { id: "BWC-B02", officer: "Priya Nair", area: "C01", connection: "Online", recording: "Filming", battery: 87, sync: "Normal", risk: "Normal" },
        { id: "BWC-B09", officer: "Tomas Reyes", area: "C02", connection: "Online", recording: "Filming", battery: 73, sync: "Normal", risk: "Normal" },
      ]
    },
    {
      status: "yellow",
      code: "GROUP D",
      location: "City College",
      riskTag: "Medium risk",
      abnormal: 2,
      total: 12,
      mission: "ongoing",
      brief: "Sync delay on two units in the east wing, not yet affecting recording.",
      recentAction: { type: "Auto", label: "Force Sync — Channel 1", status: "success", ts: "2026-07-05 05:48:09 UTC" },
      devices: [
        { id: "BWC-D03", officer: "Hana Kobayashi", area: "E02", connection: "Online", recording: "Filming", battery: 55, sync: "Sync delay", risk: "Medium risk" },
        { id: "BWC-D08", officer: "Owen Clarke", area: "E04", connection: "Online", recording: "Filming", battery: 62, sync: "Sync delay", risk: "Medium risk" },
        { id: "BWC-D01", officer: "Sofia Ricci", area: "E01", connection: "Online", recording: "Filming", battery: 91, sync: "Normal", risk: "Normal" },
      ]
    },
    {
      status: "red",
      code: "GROUP A",
      location: "Ayala Ave.",
      riskTag: "High risk",
      abnormal: 1,
      total: 6,
      mission: "ongoing",
      brief: "One unit reporting online but has not synced footage in 40 minutes.",
      recentAction: { type: "Manual", label: "Swap BWC-A09", status: "pending", ts: "2026-07-05 06:22:51 UTC" },
      devices: [
        { id: "BWC-A09", officer: "Diego Fernandez", area: "A02", connection: "Fake online", recording: "Filming", battery: 76, sync: "Sync delay", risk: "High risk" },
        { id: "BWC-A12", officer: "Rina Tan", area: "A01", connection: "Online", recording: "Filming", battery: 84, sync: "Normal", risk: "Normal" },
      ]
    },
    {
      status: "green",
      code: "GROUP C",
      location: "Olympic Stadium",
      riskTag: "Normal",
      abnormal: 0,
      total: 9,
      mission: "ongoing",
      brief: "All devices reporting normally. No action needed.",
      recentAction: null,
      devices: [
        { id: "BWC-C04", officer: "Wei Lin", area: "B02", connection: "Online", recording: "Filming", battery: 95, sync: "Normal", risk: "Normal" },
        { id: "BWC-C06", officer: "Aiko Sato", area: "B03", connection: "Online", recording: "Filming", battery: 88, sync: "Normal", risk: "Normal" },
      ]
    },
    {
      status: "green",
      code: "GROUP E",
      location: "Pentagon",
      riskTag: "Normal",
      abnormal: 0,
      total: 14,
      mission: "off",
      brief: "Mission complete. All devices returned and accounted for.",
      recentAction: { type: "Manual", label: "Swap BWC-C93", status: "success", ts: "2026-06-23 00:12:51 UTC" },
      devices: [
        { id: "BWC-E01", officer: "Grace Mbeki", area: "P01", connection: "Online", recording: "Off", battery: 100, sync: "Normal", risk: "Normal" },
        { id: "BWC-E02", officer: "Liam Foster", area: "P02", connection: "Online", recording: "Off", battery: 100, sync: "Normal", risk: "Normal" },
      ]
    }
  ];

  // Persist the data model so group-detail.html can read it without a backend.
  try { sessionStorage.setItem('mr_groups', JSON.stringify(groups)); } catch(e){}

  // Sort: red > yellow > green (group-level), stable within tier
  const order = { red: 0, yellow: 1, green: 2 };
  groups.sort((a, b) => order[a.status] - order[b.status]);

  const grid = document.getElementById('cardGrid');

  const chevronRightSVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>`;

  function statusIcon(s){
    if (s === 'success') return '✓';
    if (s === 'failed') return '✕';
    return '●';
  }

  function recentActionRowHTML(a){
    if (!a) return `<div class="recent-action"><span class="recent-action-label">Last action</span><span class="action-pill none">None</span></div>`;
    const pillClass = a.type === 'Auto' ? 'auto' : 'manual';
    const statusClass = a.status;
    return `
      <div class="recent-action">
        <span class="recent-action-label">Last action</span>
        <span class="action-pill ${pillClass}">${a.type}-Action: ${a.label}</span>
        <span class="action-sep">·</span>
        <span class="action-status ${statusClass}">${statusIcon(a.status)} ${a.status.charAt(0).toUpperCase() + a.status.slice(1)}</span>
        <span class="action-ts">${a.ts}</span>
      </div>`;
  }

  function recentActionBoxHTML(a){
    if (!a) return `<div class="box-recent"><span class="recent-action-label">Last action</span><span class="action-pill none">None</span></div>`;
    const pillClass = a.type === 'Auto' ? 'auto' : 'manual';
    const statusClass = a.status;
    return `
      <div class="box-recent">
        <span class="recent-action-label">Last action</span>
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:2px;">
          <span class="action-pill ${pillClass}">${a.type}: ${a.label}</span>
          <span class="action-status ${statusClass}">${statusIcon(a.status)} ${a.status.charAt(0).toUpperCase() + a.status.slice(1)}</span>
          <span class="action-ts">${a.ts}</span>
        </div>
      </div>`;
  }

  function riskTagLabel(status){
    if (status === "red") return "High risk";
    if (status === "yellow") return "Medium risk";
    return "Normal";
  }

  // Red/Yellow cards stay risk-colored regardless of mission state.
  // Normal-risk cards split into green (mission ongoing) or grey (mission off).
  function cardStatus(g){
    if (g.status !== 'green') return g.status;
    return g.mission === 'ongoing' ? 'green' : 'grey';
  }

  var GROUP_DETAIL_MAP = {
    'GROUP A': 'group-detail-a.html',
    'GROUP B': 'group-detail.html',
    'GROUP C': 'group-detail-c.html',
    'GROUP D': 'group-detail-d.html',
    'GROUP E': 'group-detail-e.html'
  };
  function goToDetail(code){
    var url = GROUP_DETAIL_MAP[code] || ('group-detail.html?group=' + encodeURIComponent(code));
    window.location.href = url;
  }

  // ---------- ROW CARD ----------
  function rowCard(g){
    const cs = cardStatus(g);
    return `
      <div class="group-card ${g.status !== 'green' ? 'is-risk' : ''}" data-status="${cs}" data-code="${g.code}" data-filter-status="${g.status}" data-filter-mission="${g.mission}" data-nav>
        <div class="status-edge"></div>
        <div class="card-main">
          <div class="identity">
            <span class="status-light" data-status="${cs}"></span>
            <div class="identity-text">
              <div class="group-code mono">${g.code}</div>
              <div class="location">${g.location}</div>
            </div>
          </div>

          <div class="status-col">
            <span class="risk-tag" data-status="${g.status}">${riskTagLabel(g.status)}</span>
            <span class="brief-note">${g.brief}</span>
          </div>

          <div class="number-col">
            <div class="count-line"><span class="abnormal">${g.abnormal} abnormal</span> / ${g.total} total devices</div>
            <div class="count-sub">${g.devices.length} shown in detail</div>
          </div>

          <span class="mission-tag ${g.mission}">${g.mission === 'ongoing' ? 'Mission ongoing' : 'Mission off'}</span>

          <button class="expand-btn" aria-label="Open group detail">${chevronRightSVG}</button>
        </div>
        ${recentActionRowHTML(g.recentAction)}
      </div>
    `;
  }

  // ---------- BOX CARD ----------
  function boxCard(g){
    const cs = cardStatus(g);
    return `
      <div class="box-card ${g.status !== 'green' ? 'is-risk' : ''}" data-status="${cs}" data-code="${g.code}" data-filter-status="${g.status}" data-filter-mission="${g.mission}" data-nav>
        <div class="box-top"></div>
        <div class="box-body">
          <div class="box-head">
            <div class="box-identity">
              <span class="status-light" data-status="${cs}"></span>
              <span class="group-code mono">${g.code}</span>
            </div>
            <span class="box-mission ${g.mission}">${g.mission === 'ongoing' ? 'Ongoing' : 'Off'}</span>
          </div>
          <div class="box-location">${g.location}</div>

          <div class="box-risk-row">
            <span class="risk-tag" data-status="${g.status}">${riskTagLabel(g.status)}</span>
            <span class="box-count"><span class="abnormal">${g.abnormal}</span> / ${g.total}</span>
          </div>

          <div class="box-divider"></div>

          <div class="box-brief">${g.brief}</div>

          ${recentActionBoxHTML(g.recentAction)}

          <div class="box-footer" style="margin-top:14px;">
            <span class="box-link">View group detail ${chevronRightSVG}</span>
          </div>
        </div>
      </div>

    `;
  }

  let currentView = 'row';
  let currentFilter = 'all';

  function countForFilter(f){
    if (f === 'all') return groups.length;
    if (f === 'off') return groups.filter(g => g.mission === 'off').length;
    return groups.filter(g => g.status === f && g.mission !== 'off').length;
  }

  function updateCounts(){
    ['all','red','yellow','green','off'].forEach(f => {
      const el = document.getElementById('cnt-' + f);
      if (el) el.textContent = countForFilter(f);
    });
  }

  function applyFilter(){
    const cards = grid.querySelectorAll('[data-filter-status]');
    let visible = 0;
    cards.forEach(card => {
      const s = card.getAttribute('data-filter-status');
      const m = card.getAttribute('data-filter-mission');
      let show = false;
      if (currentFilter === 'all') show = true;
      else if (currentFilter === 'off') show = m === 'off';
      else show = s === currentFilter && m !== 'off';
      card.classList.toggle('hidden', !show);
      if (show) visible++;
    });
    // Empty state
    let empty = grid.querySelector('.empty-state');
    if (visible === 0){
      if (!empty){
        empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.textContent = 'No groups match this filter.';
        grid.appendChild(empty);
      }
    } else {
      if (empty) empty.remove();
    }
  }

  function render(view){
    grid.className = view === 'box' ? 'card-grid is-box' : 'card-grid';
    grid.innerHTML = groups.map(view === 'box' ? boxCard : rowCard).join('');
    grid.querySelectorAll('[data-nav]').forEach(el => {
      el.addEventListener('click', () => goToDetail(el.getAttribute('data-code')));
    });
    applyFilter();
  }

  render('row');
  updateCounts();

  // View toggle
  const btnRow = document.getElementById('viewRow');
  const btnBox = document.getElementById('viewBox');

  btnRow.addEventListener('click', () => {
    currentView = 'row';
    btnRow.classList.add('active');
    btnBox.classList.remove('active');
    render('row');
  });

  btnBox.addEventListener('click', () => {
    currentView = 'box';
    btnBox.classList.add('active');
    btnRow.classList.remove('active');
    render('box');
  });

  // Filter tabs
  document.getElementById('filterTabs').addEventListener('click', e => {
    const tab = e.target.closest('.filter-tab');
    if (!tab) return;
    currentFilter = tab.getAttribute('data-filter');
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    applyFilter();
  });

})();
</script>

</body>
</html>
